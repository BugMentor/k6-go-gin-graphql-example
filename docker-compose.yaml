services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: payment
      POSTGRES_PASSWORD: payment
      POSTGRES_DB: payments
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U payment -d payments"]
      interval: 5s
      timeout: 3s
      retries: 5

  payment-service:
    build: .
    container_name: payment-service
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      SERVICE_NAME: payment-service
      DATABASE_URL: postgres://payment:payment@postgres:5432/payments?sslmode=disable
      OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4317
    depends_on:
      postgres:
        condition: service_healthy

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    container_name: otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
    depends_on:
      - mimir
      - loki
      - tempo

  mimir:
    image: grafana/mimir:latest
    container_name: lgtm-mimir
    command: ["-config.file=/etc/mimir.yaml"]
    ports:
      - "9009:9009"
    volumes:
      - ./benchmark/lgtm/mimir.yaml:/etc/mimir.yaml:ro
      - ./.data/mimir:/data
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: lgtm-loki
    ports:
      - "3100:3100"
    command: "-config.file=/etc/loki/local-config.yaml"
    restart: unless-stopped

  tempo:
    image: grafana/tempo:latest
    container_name: lgtm-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    ports:
      - "3200:3200"
    volumes:
      - ./tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: lgtm-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_INSTALL_PLUGINS: ""
    ports:
      - "3000:3000"
    volumes:
      - ./benchmark/grafana/lgtm-datasources.yaml:/etc/grafana/provisioning/datasources/lgtm.yaml:ro
      - ./benchmark/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - mimir
      - loki
      - tempo

volumes:
  postgres_data:
  tempo_data:
  grafana_data:
